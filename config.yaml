# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: "Akkudoktor-EOS"
version: "0.2.0.dev45476746"
slug: "eos"
description: "Akkudoktor-EOS add-on"
url: "https://github.com/Akkudoktor-EOS/EOS/tree/main"

homeassistant: true
homeassistant_api: true
ingress: true
ingress_port: 8504
panel_icon: "mdi:web"

arch:
  - aarch64
  - amd64

startup: "application"
init: false
boot: "auto"

# Map home assistant persistent folders
map:
  - data:rw
  - share:rw
  - config:rw

# Ports exposed by the add-on
ports:
  8503/tcp: 8503
  #8504/tcp: 8504 - ingress

ports_description:
  8503/tcp: "EOS REST server"
  8504/tcp: "EOSdash dashboard server"

options: {}
schema: {}

# EOS uses several directories under /data - config, cache, output
backup_exclude:
  - /data/cache
  - /data/output
