# Exclude some file types from automatic code style
exclude: \.(json|csv)$
repos:
  # --- Basic sanity checks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
        exclude: '\.rst$'  # Exclude .rst files from whitespace cleanup

  # --- Import sorting ---
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort

  # --- Linting + Formatting via Ruff ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      # Run the linter and fix simple isssues automatically
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # --- Static type checking ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests==2.32.4.20250913
          - pandas-stubs==2.3.2.250926
          - tokenize-rt==3.2.0
        pass_filenames: false

  # --- Markdown linter ---
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.32
    hooks:
      - id: pymarkdown
        files: ^docs/
        exclude: ^docs/_generated
        args:
          - --config=docs/pymarkdown.json
          - scan

  # --- Commit message linting ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.9.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
